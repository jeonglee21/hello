<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 출석 관리 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        .status-btn.active-present { background-color: #10b981; color: white; border-color: #10b981; }
        .status-btn.active-absent { background-color: #ef4444; color: white; border-color: #ef4444; }
        .status-btn.active-late { background-color: #f59e0b; color: white; border-color: #f59e0b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-8 px-4">

    <div class="max-w-2xl mx-auto">
        <!-- 헤더 -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">📋 학생 출석 체크</h1>
            <p class="text-slate-500 mt-2">실시간으로 출석 기록을 관리하세요</p>
        </header>

        <!-- 입력 폼 카드 -->
        <div class="bg-white shadow-xl rounded-2xl p-6 mb-8 border border-slate-100">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">학생 이름</label>
                    <input type="text" id="studentName" placeholder="이름을 입력하세요" 
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">출석 상태 선택</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="setStatus('출석')" id="btn-present" class="status-btn py-3 px-4 rounded-lg border border-slate-200 font-medium text-slate-600 hover:bg-slate-50 transition-all">출석</button>
                        <button onclick="setStatus('결석')" id="btn-absent" class="status-btn py-3 px-4 rounded-lg border border-slate-200 font-medium text-slate-600 hover:bg-slate-50 transition-all">결석</button>
                        <button onclick="setStatus('지각')" id="btn-late" class="status-btn py-3 px-4 rounded-lg border border-slate-200 font-medium text-slate-600 hover:bg-slate-50 transition-all">지각</button>
                    </div>
                </div>

                <button onclick="submitAttendance()" 
                    class="w-full bg-slate-800 text-white font-bold py-4 rounded-lg hover:bg-slate-700 transform active:scale-[0.98] transition-all mt-4">
                    기록 저장하기
                </button>
            </div>
        </div>

        <!-- 출석 리스트 섹션 -->
        <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-100">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h2 class="font-bold text-slate-800">오늘의 출석 명단</h2>
                <span id="recordCount" class="text-xs font-bold bg-blue-100 text-blue-600 px-2.5 py-1 rounded-full">0명</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 text-slate-500 text-sm">
                            <th class="px-6 py-3 font-semibold">이름</th>
                            <th class="px-6 py-3 font-semibold">상태</th>
                            <th class="px-6 py-3 font-semibold text-right">시간</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList" class="divide-y divide-slate-100">
                        <!-- 데이터가 여기에 실시간으로 추가됨 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase 설정 (본인의 설정으로 교체 필수)
        const firebaseConfig = {
           apiKey: "AIzaSyCH2mLIK_fbnHM0UNKnwiADsdnnc7Myh2k",
  authDomain: "hello-b6e9f.firebaseapp.com",
  projectId: "hello-b6e9f",
  storageBucket: "hello-b6e9f.firebasestorage.app",
  messagingSenderId: "325295080241",
  appId: "1:325295080241:web:3d1f74dcddb6927bf7a610"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const attendanceCol = collection(db, "attendance");

        let selectedStatus = "";

        // 상태 선택 함수
        window.setStatus = (status) => {
            selectedStatus = status;
            // 버튼 스타일 초기화
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('active-present', 'active-absent', 'active-late');
            });
            // 선택된 버튼 스타일 적용
            if(status === '출석') document.getElementById('btn-present').classList.add('active-present');
            if(status === '결석') document.getElementById('btn-absent').classList.add('active-absent');
            if(status === '지각') document.getElementById('btn-late').classList.add('active-late');
        };

        // 데이터 저장 함수
        window.submitAttendance = async () => {
            const nameInput = document.getElementById('studentName');
            const name = nameInput.value.trim();

            if (!name) {
                alert("학생 이름을 입력해주세요.");
                return;
            }
            if (!selectedStatus) {
                alert("출석 상태를 선택해주세요.");
                return;
            }

            try {
                await addDoc(attendanceCol, {
                    name: name,
                    status: selectedStatus,
                    timestamp: serverTimestamp()
                });
                
                // 입력 초기화
                nameInput.value = "";
                selectedStatus = "";
                document.querySelectorAll('.status-btn').forEach(btn => {
                    btn.classList.remove('active-present', 'active-absent', 'active-late');
                });
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("저장 중 오류가 발생했습니다.");
            }
        };

        // 실시간 데이터 수신 및 화면 렌더링
        const q = query(attendanceCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listElement = document.getElementById('attendanceList');
            const countElement = document.getElementById('recordCount');
            listElement.innerHTML = "";
            countElement.innerText = `${snapshot.size}명`;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const time = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                
                let statusBadge = "";
                if(data.status === '출석') statusBadge = '<span class="px-2.5 py-1 rounded-md bg-emerald-100 text-emerald-700 text-xs font-bold">출석</span>';
                else if(data.status === '결석') statusBadge = '<span class="px-2.5 py-1 rounded-md bg-rose-100 text-rose-700 text-xs font-bold">결석</span>';
                else statusBadge = '<span class="px-2.5 py-1 rounded-md bg-amber-100 text-amber-700 text-xs font-bold">지각</span>';

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-700">${data.name}</td>
                        <td class="px-6 py-4">${statusBadge}</td>
                        <td class="px-6 py-4 text-right text-slate-400 text-sm">${time}</td>
                    </tr>
                `;
                listElement.innerHTML += row;
            });
        });
    </script>
</body>
</html>
